name: CD

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install musl-tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: installer
        run: cargo build --release --target ${{ matrix.target }}

      - name: Compress binary
        run: tar -czf dotfiles-${{ matrix.target }}.tar.gz -C installer/target/${{ matrix.target }}/release dotfiles

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotfiles-${{ matrix.target }}
          path: dotfiles-${{ matrix.target }}.tar.gz

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            dotfiles-x86_64-apple-darwin/dotfiles-x86_64-apple-darwin.tar.gz
            dotfiles-aarch64-apple-darwin/dotfiles-aarch64-apple-darwin.tar.gz
            dotfiles-x86_64-unknown-linux-musl/dotfiles-x86_64-unknown-linux-musl.tar.gz
